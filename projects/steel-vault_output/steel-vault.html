<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .category {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
        }
        .category h3 {
            margin: 0;
        }
        .category input {
            margin-top: 5px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Budget Tracker</h1>
    </div>
    <div id="dashboard">
        <!-- Categories will be added here -->
    </div>
    <button id="addCategoryBtn">New Category</button>
    <div id="error" class="error"></div>

    <script>
        // [graft:data]
        const budgetCategories = [
            { name: 'Groceries', balance: 0, limit: 500 },
            { name: 'Utilities', balance: 0, limit: 200 },
            { name: 'Entertainment', balance: 0, limit: 100 }
        ];
        // [/graft:data]

        // [graft:structure]
        function renderDashboard() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            budgetCategories.forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `
                    <h3>${category.name}</h3>
                    <p>Balance: $${category.balance}</p>
                    <p>Limit: $${category.limit}</p>
                    <button onclick="editCategory('${category.name}')">Edit</button>
                `;
                dashboard.appendChild(categoryDiv);
            });
        }
        // [/graft:structure]

        // [graft:when_add_category]
        document.getElementById('addCategoryBtn').addEventListener('click', () => {
            const name = prompt('Enter category name:');
            const limit = parseFloat(prompt('Enter category limit:'));
            if (name && !isNaN(limit)) {
                budgetCategories.push({ name, balance: 0, limit });
                renderDashboard();
            }
        });
        // [/graft:when_add_category]

        // [graft:when_update_category_balance]
        function editCategory(name) {
            const category = budgetCategories.find(c => c.name === name);
            const newBalance = parseFloat(prompt('Enter new balance:'));
            if (!isNaN(newBalance)) {
                category.balance = newBalance;
                renderDashboard();
            }
        }
        // [/graft:when_update_category_balance]

        // [graft:assert_category_limits]
        function checkCategoryLimits() {
            budgetCategories.forEach(category => {
                if (category.balance > category.limit) {
                    alert('Category limit exceeded');
                }
            });
        }
        // [/graft:assert_category_limits]

        // [graft:surface_error_messages]
        const errorMessages = {
            categoryLimitExceeded: 'Category limit exceeded'
        };
        // [/graft:surface_error_messages]

        // Initial render
        renderDashboard();
    </script>
</body>
</html>
