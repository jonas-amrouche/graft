<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .search-bar {
            padding: 10px;
            text-align: center;
        }
        .recipe-list {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        .recipe-card {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .recipe-card.empty {
            text-align: center;
        }
        .recipe-details {
            display: none;
            padding: 10px;
            border: 1px solid #ddd;
        }
        .recipe-details.active {
            display: block;
        }
        .form-container {
            padding: 10px;
        }
        .form-container input, .form-container textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }
        .form-container button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        Recipe Book
    </div>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search recipes...">
    </div>
    <div class="recipe-list" id="recipe-list">
        <div class="recipe-card empty">No recipes yet — add one above</div>
    </div>
    <div class="form-container" id="form-container">
        <input type="text" id="recipe-title" placeholder="Recipe Title">
        <textarea id="recipe-ingredients" placeholder="Ingredients"></textarea>
        <textarea id="recipe-instructions" placeholder="Instructions"></textarea>
        <input type="number" id="recipe-cooking-time" placeholder="Cooking Time (minutes)">
        <input type="number" id="recipe-rating" placeholder="Rating (1-5)">
        <button id="add-recipe-btn">Add Recipe</button>
    </div>

    <script>
        // [graft:data]
        const recipeBook = {
            recipes: []
        };
        // [/graft:data]

        // [graft:structure]
        const recipeList = document.getElementById('recipe-list');
        const searchInput = document.getElementById('search-input');
        const formContainer = document.getElementById('form-container');
        const addRecipeBtn = document.getElementById('add-recipe-btn');
        // [/graft:structure]

        // [graft:data]
        function updateRecipeList() {
            recipeList.innerHTML = '';
            if (recipeBook.recipes.length === 0) {
                recipeList.innerHTML = '<div class="recipe-card empty">No recipes yet — add one above</div>';
            } else {
                recipeBook.recipes.forEach(recipe => {
                    const card = document.createElement('div');
                    card.classList.add('recipe-card');
                    card.innerHTML = `
                        <h3>${recipe.title}</h3>
                        <p>${recipe.ingredients.slice(0, 50)}...</p>
                        <button class="view-details-btn">View Details</button>
                    `;
                    recipeList.appendChild(card);
                });
            }
        }
        // [/graft:data]

        // [graft:when]
        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            recipeBook.recipes = recipeBook.recipes.filter(recipe => recipe.title.toLowerCase().includes(searchTerm));
            updateRecipeList();
        });

        addRecipeBtn.addEventListener('click', () => {
            const title = document.getElementById('recipe-title').value;
            const ingredients = document.getElementById('recipe-ingredients').value;
            const instructions = document.getElementById('recipe-instructions').value;
            const cookingTime = parseInt(document.getElementById('recipe-cooking-time').value);
            const rating = parseInt(document.getElementById('recipe-rating').value);

            if (title.trim() === '') {
                alert('Recipe title cannot be empty.');
                return;
            }

            recipeBook.recipes.unshift({ title, ingredients, instructions, cookingTime, rating });
            updateRecipeList();
            formContainer.reset();
        });

        recipeList.addEventListener('click', (event) => {
            if (event.target.classList.contains('view-details-btn')) {
                const card = event.target.closest('.recipe-card');
                const details = card.nextElementSibling;
                if (details) {
                    details.classList.toggle('active');
                } else {
                    const details = document.createElement('div');
                    details.classList.add('recipe-details');
                    details.innerHTML = `
                        <h3>${card.querySelector('h3').innerText}</h3>
                        <p><strong>Ingredients:</strong> ${card.querySelector('p').innerText}</p>
                        <p><strong>Instructions:</strong> ${card.querySelector('p').innerText}</p>
                        <p><strong>Cooking Time:</strong> ${card.querySelector('p').innerText}</p>
                        <p><strong>Rating:</strong> ${card.querySelector('p').innerText}</p>
                    `;
                    card.appendChild(details);
                }
            }
        });
        // [/graft:when]

        // [graft:assert]
        function validateRecipeTitle(title) {
            if (title.trim() === '') {
                throw new Error('Recipe title cannot be empty.');
            }
        }
        // [/graft:assert]

        // [graft:surface]
        const recipeCard = {
            title: 'Recipe Title',
            ingredients: 'Ingredients',
            instructions: 'Instructions',
            cookingTime: 'Cooking Time',
            rating: 'Rating',
            viewDetails: 'View Details'
        };
        // [/graft:surface]
    </script>
</body>
</html>
