<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Cooking Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #303030;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .ingredient-grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            background-color: #202020;
            padding: 20px;
            border-radius: 10px;
        }
        .ingredient-cell {
            text-align: left;
            padding: 10px;
            cursor: pointer;
        }
        .ingredient-cell:hover {
            background-color: #404040;
        }
    </style>
</head>
<body>
    <div class="ingredient-grid">
        <!-- Ingredient cells will be dynamically generated here -->
    </div>

    <script>
        // [graft:ingredient_list]
        let ingredient_list = [
            "Tomato", "Onion", "Garlic", "Bell Pepper", "Pineapple", "Mushroom", 
            "Chicken", "Beef", "Lamb", "Pork", "Fish", "Cucumber", "Cabbage", 
            "Carrot", "Broccoli", "Zucchini", "Spinach", "Egg", "Cheese", 
            "Tomato Sauce", "Mayonnaise", "Ketchup", "Bread", "Lemon", 
            "Herbs", "Seasonings", "Oil", "Vinegar", "Sauce", "Butter", 
            "Lettuce", "Tomato Salad", "Potato Salad", "Avocado", "Cantaloupe"
        ];

        // [graft:display_ingredient]
        function display_ingredient() {
            const ingredientGrid = document.querySelector('.ingredient-grid');
            ingredient_list.forEach((ingredient) => {
                const cell = document.createElement('div');
                cell.classList.add('ingredient-cell');
                cell.textContent = ingredient;
                cell.addEventListener('click', () => {
                    // [graft:ingredient_click]
                    console.log(`Clicked on ${ingredient}`);
                });
                ingredientGrid.appendChild(cell);
            });
        }

        // Initialize the ingredient grid
        display_ingredient();
    </script>
</body>
</html>
