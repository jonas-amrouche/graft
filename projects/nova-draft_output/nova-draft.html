<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit List</title>
    <style>
        // [graft:habit_card]
        .habit-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .habit-card.completed {
            text-decoration: line-through;
        }
        .habit-card input[type="checkbox"] {
            margin-right: 10px;
        }
        .habit-card .habit-name {
            flex-grow: 1;
        }
        // [/graft:habit_card]

        // [graft:habit_screen]
        body {
            font-family: Arial, sans-serif;
        }
        .app-bar {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .habit-list {
            padding: 10px;
        }
        .add-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }
        // [/graft:habit_screen]
    </style>
</head>
<body>
    <div class="app-bar">
        Habit List
    </div>
    <div class="habit-list" id="habit-list">
        <!-- Habit cards will be dynamically added here -->
    </div>
    <button class="add-button" id="add-button">+</button>

    <script>
        // [graft:data]
        const habits = [
            { name: "Drink Water", completed: false, date: new Date() },
            { name: "Exercise", completed: false, date: new Date() },
            { name: "Read a Book", completed: false, date: new Date() }
        ];
        // [/graft:data]

        // [graft:when]
        document.getElementById('add-button').addEventListener('click', () => {
            const habitName = prompt("Enter habit name:");
            if (habitName && isUniqueHabitName(habitName)) {
                habits.push({ name: habitName, completed: false, date: new Date() });
                renderHabitList();
            } else {
                alert("Habit name must be unique.");
            }
        });

        document.getElementById('habit-list').addEventListener('change', (event) => {
            if (event.target.type === 'checkbox') {
                const index = Array.from(event.target.parentNode.parentNode.children).indexOf(event.target.parentNode);
                habits[index].completed = event.target.checked;
                renderHabitList();
            }
        });
        // [/graft:when]

        // [graft:assert]
        function isUniqueHabitName(name) {
            return habits.every(habit => habit.name !== name);
        }
        // [/graft:assert]

        // [graft:surface]
        function renderHabitList() {
            const habitList = document.getElementById('habit-list');
            habitList.innerHTML = '';
            habits.forEach((habit, index) => {
                const card = document.createElement('div');
                card.className = `habit-card ${habit.completed ? 'completed' : ''}`;
                card.innerHTML = `
                    <input type="checkbox" ${habit.completed ? 'checked' : ''}>
                    <div class="habit-name">${habit.name}</div>
                    <div>${habit.date.toLocaleDateString()}</div>
                `;
                habitList.appendChild(card);
            });
        }
        // [/graft:surface]

        // Initial render
        renderHabitList();
    </script>
</body>
</html>
