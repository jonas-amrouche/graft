<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .task-list {
            margin: 20px;
        }
        .task-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-card.completed {
            text-decoration: line-through;
        }
        .add-task-form {
            display: none;
            margin-top: 20px;
        }
        .add-task-form input {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="task-list">
        <h1>Task List</h1>
        <div class="add-task-form">
            <input type="text" id="task-title" placeholder="Task Title">
            <button onclick="addTask()">Add Task</button>
        </div>
        <div id="task-list-container">
            <!-- Task cards will be added here -->
        </div>
        <button onclick="toggleAddTaskForm()" id="add-task-btn">New Task</button>
    </div>

    <script>
        // [graft:data]
        const taskList = [];
        // [/graft:data]

        // [graft:structure]
        const taskListContainer = document.getElementById('task-list-container');
        const addTaskBtn = document.getElementById('add-task-btn');
        const addTaskForm = document.querySelector('.add-task-form');
        const taskTitleInput = document.getElementById('task-title');
        // [/graft:structure]

        // [graft:when_add_task]
        function addTask() {
            const title = taskTitleInput.value.trim();
            if (title) {
                taskList.unshift({ title, completed: false, date: new Date() });
                renderTaskList();
                taskTitleInput.value = '';
            }
        }
        // [/graft:when_add_task]

        // [graft:when_complete_task]
        function completeTask(index) {
            taskList[index].completed = true;
            renderTaskList();
        }
        // [/graft:when_complete_task]

        // [graft:assert_task_title]
        function validateTaskTitle(title) {
            return title.trim() !== '';
        }
        // [/graft:assert_task_title]

        // [graft:surface_task_screen]
        function renderTaskList() {
            taskListContainer.innerHTML = '';
            if (taskList.length === 0) {
                taskListContainer.innerHTML = '<p>No tasks yet — add one above</p>';
            } else {
                taskList.forEach((task, index) => {
                    const card = document.createElement('div');
                    card.classList.add('task-card', task.completed ? 'completed' : '');
                    card.innerHTML = `
                        <span>${task.title}</span>
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="completeTask(${index})">
                        <span>${task.date.toLocaleString()}</span>
                    `;
                    taskListContainer.appendChild(card);
                });
            }
        }
        // [/graft:surface_task_screen]

        // [graft:anchor]
        function toggleAddTaskForm() {
            addTaskForm.style.display = addTaskForm.style.display === 'none' ? 'block' : 'none';
        }
        // [/graft:anchor]

        // Initial render
        renderTaskList();
    </script>
</body>
</html>
