<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .category-card {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .category-card input[type="number"] {
            width: 50%;
        }
        .category-card button {
            width: 20%;
        }
        .summary {
            background-color: #f1f1f1;
            padding: 10px;
            text-align: center;
        }
        .error-message {
            color: red;
            margin-top: 10px;
        }
        .task-card {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .task-card input[type="checkbox"] {
            margin-right: 10px;
        }
        .stats-panel {
            margin-top: 20px;
        }
        .pie-chart {
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }
        .stats-table th, .stats-table td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        .stats-table th {
            background-color: #f2f2f2;
        }
        .stats-summary {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">Budget App</div>
    <div id="dashboard">
        <button onclick="showAddCategoryForm()">Add Category</button>
        <div id="category-list"></div>
        <div class="summary">
            Total Balance: <span id="total-balance">0</span><br>
            Percentage Spent: <span id="percentage-spent">0%</span>
        </div>
    </div>
    <div id="add-category-form" style="display:none;">
        <input type="text" id="category-name" placeholder="Category Name">
        <input type="number" id="budget-limit" placeholder="Budget Limit">
        <button onclick="addCategory()">Add</button>
        <button onclick="hideAddCategoryForm()">Cancel</button>
    </div>
    <div id="task-screen" style="display:none;">
        <div class="header">Tasks</div>
        <button onclick="showTaskForm()">Yay</button>
        <div id="task-list"></div>
    </div>
    <div id="task-form" style="display:none;">
        <input type="text" id="task-title" placeholder="Task Title">
        <button onclick="addTask()">Add</button>
        <button onclick="hideTaskForm()">Cancel</button>
    </div>
    <div id="stats-panel" style="display:none;">
        <div class="header">Budget Summary</div>
        <div class="pie-chart" id="pie-chart"></div>
        <table class="stats-table">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Balance</th>
                    <th>Budget Limit</th>
                </tr>
            </thead>
            <tbody id="stats-table-body"></tbody>
        </table>
        <div class="stats-summary">
            Total Balance: <span id="stats-total-balance">0</span><br>
            Percentage Spent: <span id="stats-percentage-spent">0%</span>
        </div>
    </div>
    <script>
        let budgetCategories = [];
        let tasks = [];

        function showAddCategoryForm() {
            document.getElementById('add-category-form').style.display = 'block';
        }

        function hideAddCategoryForm() {
            document.getElementById('add-category-form').style.display = 'none';
        }

        function addCategory() {
            const name = document.getElementById('category-name').value;
            const budgetLimit = parseFloat(document.getElementById('budget-limit').value);
            if (budgetLimit <= 0) {
                alert('Budget limit must be greater than 0');
                return;
            }
            budgetCategories.push({ name, balance: 0, budgetLimit });
            updateDashboard();
            hideAddCategoryForm();
        }

        function updateDashboard() {
            const categoryList = document.getElementById('category-list');
            categoryList.innerHTML = '';
            budgetCategories.forEach(category => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <span>${category.name}: ${category.balance} / ${category.budgetLimit}</span>
                    <button onclick="showEditCategoryForm('${category.name}')">Edit</button>
                `;
                card.querySelector('button').addEventListener('click', () => {
                    showEditCategoryForm(category.name);
                });
                categoryList.appendChild(card);
            });
            updateSummary();
        }

        function showEditCategoryForm(name) {
            const category = budgetCategories.find(c => c.name === name);
            const form = document.createElement('div');
            form.innerHTML = `
                <input type="text" id="edit-category-name" value="${category.name}">
                <input type="number" id="edit-budget-limit" value="${category.budgetLimit}">
                <button onclick="updateCategoryBalance('${category.name}')">Update</button>
                <button onclick="hideEditCategoryForm()">Cancel</button>
            `;
            document.body.appendChild(form);
        }

        function hideEditCategoryForm() {
            document.body.removeChild(document.body.lastChild);
        }

        function updateCategoryBalance(name) {
            const category = budgetCategories.find(c => c.name === name);
            const newName = document.getElementById('edit-category-name').value;
            const newBudgetLimit = parseFloat(document.getElementById('edit-budget-limit').value);
            if (newBudgetLimit <= 0) {
                alert('Budget limit must be greater than 0');
                return;
            }
            category.name = newName;
            category.budgetLimit = newBudgetLimit;
            updateDashboard();
            hideEditCategoryForm();
        }

        function updateSummary() {
            const totalBalance = budgetCategories.reduce((sum, category) => sum + category.balance, 0);
            const totalBudget = budgetCategories.reduce((sum, category) => sum + category.budgetLimit, 0);
            const percentageSpent = (totalBalance / totalBudget) * 100;
            document.getElementById('total-balance').innerText = totalBalance.toFixed(2);
            document.getElementById('percentage-spent').innerText = percentageSpent.toFixed(2) + '%';
        }

        function showTaskForm() {
            document.getElementById('task-form').style.display = 'block';
        }

        function hideTaskForm() {
            document.getElementById('task-form').style.display = 'none';
        }

        function addTask() {
            const title = document.getElementById('task-title').value;
            tasks.push({ title, completed: false });
            updateTaskScreen();
            hideTaskForm();
        }

        function updateTaskScreen() {
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTaskCompletion(this)">
                    <span>${task.title}</span>
                `;
                card.querySelector('input[type="checkbox"]').addEventListener('change', () => {
                    toggleTaskCompletion(card.querySelector('input[type="checkbox"]'));
                });
                taskList.appendChild(card);
            });
        }

        function toggleTaskCompletion(checkbox) {
            const task = tasks.find(t => t.title === checkbox.nextElementSibling.innerText);
            task.completed = checkbox.checked;
            updateTaskScreen();
        }

        function showStatsPanel() {
            document.getElementById('stats-panel').style.display = 'block';
            updateStatsPanel();
        }

        function updateStatsPanel() {
            const totalBalance = budgetCategories.reduce((sum, category) => sum + category.balance, 0);
            const totalBudget = budgetCategories.reduce((sum, category) => sum + category.budgetLimit, 0);
            const percentageSpent = (totalBalance / totalBudget) * 100;
            document.getElementById('stats-total-balance').innerText = totalBalance.toFixed(2);
            document.getElementById('stats-percentage-spent').innerText = percentageSpent.toFixed(2) + '%';
        }
    </script>
</body>
</html>
