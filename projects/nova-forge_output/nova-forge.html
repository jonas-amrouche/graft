<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .summary {
            padding: 20px;
            text-align: center;
        }
        .category-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
        }
        .category-card.green {
            background-color: #c8e6c9;
        }
        .category-card.yellow {
            background-color: #fff3cd;
        }
        .category-card.red {
            background-color: #f8d7da;
        }
        .add-category-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Budget Tracker</h1>
    </div>
    <div class="summary">
        <h2>Summary</h2>
        <p>Total Income: $0</p>
        <p>Total Expenses: $0</p>
    </div>
    <div id="category-list"></div>
    <button class="add-category-button">Add Category</button>

    <script>
        // [graft:data]
        const budgetCategories = [
            { name: 'Groceries', balance: 0, limit: 500 },
            { name: 'Utilities', balance: 0, limit: 200 },
            { name: 'Entertainment', balance: 0, limit: 100 }
        ];
        // [/graft:data]

        // [graft:structure]
        const categoryList = document.getElementById('category-list');
        const addCategoryButton = document.querySelector('.add-category-button');

        function renderCategories() {
            categoryList.innerHTML = '';
            budgetCategories.forEach(category => {
                const card = document.createElement('div');
                card.className = `category-card ${getBalanceStatus(category)}`;
                card.innerHTML = `
                    <h3>${category.name}</h3>
                    <p>Balance: $${category.balance}</p>
                    <p>Limit: $${category.limit}</p>
                    <button class="edit-button">Edit</button>
                `;
                categoryList.appendChild(card);
            });
        }

        function getBalanceStatus(category) {
            if (category.balance <= category.limit) {
                return 'green';
            } else if (category.balance <= category.limit * 1.1) {
                return 'yellow';
            } else {
                return 'red';
            }
        }

        function showForm(category) {
            const form = document.createElement('div');
            form.className = 'form';
            form.innerHTML = `
                <h3>Edit ${category.name}</h3>
                <input type="number" id="new-balance" value="${category.balance}">
                <button class="save-button">Save</button>
            `;
            categoryList.appendChild(form);

            const saveButton = form.querySelector('.save-button');
            saveButton.addEventListener('click', () => {
                const newBalance = parseFloat(document.getElementById('new-balance').value);
                if (newBalance > category.limit) {
                    alert('Balance cannot exceed limit');
                } else {
                    category.balance = newBalance;
                    renderCategories();
                }
            });
        }

        addCategoryButton.addEventListener('click', () => {
            const form = document.createElement('div');
            form.className = 'form';
            form.innerHTML = `
                <h3>Add Category</h3>
                <input type="text" id="new-category-name" placeholder="Category Name">
                <input type="number" id="new-category-limit" placeholder="Monthly Limit">
                <button class="add-button">Add</button>
            `;
            categoryList.appendChild(form);

            const addButton = form.querySelector('.add-button');
            addButton.addEventListener('click', () => {
                const name = document.getElementById('new-category-name').value;
                const limit = parseFloat(document.getElementById('new-category-limit').value);
                budgetCategories.push({ name, balance: 0, limit });
                renderCategories();
            });
        });

        categoryList.addEventListener('click', (event) => {
            if (event.target.classList.contains('edit-button')) {
                const category = budgetCategories.find(cat => categoryList.querySelector(`.category-card h3`).textContent === event.target.parentNode.querySelector('h3').textContent);
                showForm(category);
            }
        });

        renderCategories();
        // [/graft:structure]

        // [graft:when]
        // Add Category and Update Category Balance are handled in the structure section
        // [/graft:when]

        // [graft:assert]
        // Category Balance Validation is handled in the structure section
        // [/graft:assert]

        // [graft:surface]
        // Category Card styles are defined in the style section
        // [/graft:surface]
    </script>
</body>
</html>
