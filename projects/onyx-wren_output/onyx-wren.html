<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }
        .summary {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #f4f4f4;
        }
        .category-list {
            list-style-type: none;
            padding: 0;
        }
        .category-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }
        .category-card:last-child {
            border-bottom: none;
        }
        .category-name {
            flex: 1;
        }
        .category-balance {
            flex: 1;
            text-align: center;
        }
        .category-limit {
            flex: 1;
            text-align: center;
        }
        .category-balance.under-budget {
            color: green;
        }
        .category-balance.close-to-budget {
            color: yellow;
        }
        .category-balance.over-budget {
            color: red;
        }
        .add-category-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-align: center;
            text-decoration: none;
        }
        .form-container {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            margin: 20px auto;
        }
        .form-container.active {
            display: block;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 5px;
        }
        .form-group button {
            padding: 5px 10px;
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Budget Tracker</h1>
    </header>
    <div class="summary">
        <div>Total Income: $0</div>
        <div>Total Expenses: $0</div>
    </div>
    <ul class="category-list" id="category-list">
        <!-- Category cards will be dynamically added here -->
    </ul>
    <button class="add-category-btn" onclick="showForm('add')">Add Category</button>
    <div class="form-container" id="add-category-form">
        <h2>Add Category</h2>
        <div class="form-group">
            <label for="category-name">Name</label>
            <input type="text" id="category-name" required>
        </div>
        <div class="form-group">
            <label for="category-limit">Monthly Limit</label>
            <input type="number" id="category-limit" required>
        </div>
        <button onclick="addCategory()">Add</button>
        <button onclick="hideForm('add')">Cancel</button>
    </div>

    <script>
        let budgetCategories = [];

        function showForm(formId) {
            document.getElementById(formId + '-category-form').classList.add('active');
        }

        function hideForm(formId) {
            document.getElementById(formId + '-category-form').classList.remove('active');
        }

        function addCategory() {
            const name = document.getElementById('category-name').value;
            const limit = parseFloat(document.getElementById('category-limit').value);
            if (isNaN(limit) || limit <= 0) {
                alert('Invalid monthly limit');
                return;
            }
            budgetCategories.push({ name, balance: 0, limit });
            updateCategoryList();
            hideForm('add');
        }

        function updateCategoryList() {
            const categoryList = document.getElementById('category-list');
            categoryList.innerHTML = '';
            budgetCategories.forEach(category => {
                const card = document.createElement('li');
                card.className = 'category-card';
                card.innerHTML = `
                    <div class="category-name">${category.name}</div>
                    <div class="category-balance ${getBalanceClass(category.balance, category.limit)}">${category.balance.toFixed(2)}</div>
                    <div class="category-limit">${category.limit.toFixed(2)}</div>
                    <button onclick="showForm('edit-${category.name}')">Edit</button>
                `;
                categoryList.appendChild(card);
            });
        }

        function getBalanceClass(balance, limit) {
            if (balance <= limit * 0.8) return 'under-budget';
            if (balance <= limit) return 'close-to-budget';
            return 'over-budget';
        }

        // Initialize category list
        updateCategoryList();
    </script>
</body>
</html>
