<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #todo-list {
            list-style-type: none;
            padding: 0;
        }
        .todo-item {
            background-color: #202020;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .completed {
            text-decoration: line-through;
            color: #888888;
        }
        .add-task {
            margin-top: 20px;
        }
        .add-task input[type="text"] {
            padding: 10px;
            margin-right: 10px;
        }
        .add-task button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <h1>Todo List App</h1>
    <ul id="todo-list"></ul>
    <div class="add-task">
        <input type="text" id="task-title" placeholder="Task Title">
        <input type="text" id="task-description" placeholder="Task Description">
        <input type="date" id="task-due-date">
        <button onclick="addTask()">Add Task</button>
    </div>

    <script>
        let todo_list = [];

        function addTask() {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-description').value;
            const due_date = document.getElementById('task-due-date').value || new Date().toISOString().split('T')[0];
            const id = Date.now();

            todo_list.push({ id, title, description, due_date, completed: false });

            displayTodoList();
            document.getElementById('task-title').value = '';
            document.getElementById('task-description').value = '';
            document.getElementById('task-due-date').value = '';
        }

        function displayTodoList() {
            const todoListElement = document.getElementById('todo-list');
            todoListElement.innerHTML = '';

            todo_list.forEach(task => {
                const todoItem = document.createElement('li');
                todoItem.className = 'todo-item ' + (task.completed ? 'completed' : '');

                const title = document.createElement('span');
                title.textContent = task.title;

                const description = document.createElement('span');
                description.textContent = ' - ' + task.description;

                const dueDate = document.createElement('span');
                dueDate.textContent = ' (Due: ' + task.due_date + ')';

                const markCompleteButton = document.createElement('button');
                markCompleteButton.textContent = 'Complete';
                markCompleteButton.onclick = () => markTaskComplete(task.id);

                todoItem.appendChild(title);
                todoItem.appendChild(description);
                todoItem.appendChild(dueDate);
                todoItem.appendChild(markCompleteButton);

                todoListElement.appendChild(todoItem);
            });
        }

        function markTaskComplete(id) {
            todo_list = todo_list.map(task => {
                if (task.id === id) {
                    task.completed = true;
                }
                return task;
            });

            displayTodoList();
        }
    </script>
</body>
</html>
