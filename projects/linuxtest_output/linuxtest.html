<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .task-list {
            max-height: 600px;
            overflow-y: auto;
            margin: 20px;
        }
        .task-item {
            border-bottom: 1px solid #333333;
            padding: 10px 0;
        }
        .task-title {
            font-weight: bold;
        }
        .task-description {
            color: #888888;
        }
        .task-checkbox {
            margin-left: 10px;
        }
        .form-container {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            background-color: #222222;
            border-radius: 5px;
        }
        .form-container h2 {
            margin-top: 0;
        }
        .form-container input, .form-container textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 5px;
        }
        .form-container button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-container button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="task-list" id="task-list">
        <!-- [graft:task_list] -->
        <!-- Task items will be dynamically added here -->
        <!-- [/graft:task_list] -->
    </div>
    <div class="form-container">
        <h2>Add Task</h2>
        <input type="text" id="task-title" placeholder="Title">
        <textarea id="task-description" placeholder="Description"></textarea>
        <label>
            <input type="checkbox" id="task-completed">
            Completed
        </label>
        <button onclick="addTask()">Add Task</button>
    </div>

    <script>
        let taskId = 1;
        const taskList = document.getElementById('task-list');

        // [graft:add_task]
        function addTask() {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-description').value;
            const completed = document.getElementById('task-completed').checked;

            if (title.trim() === '') {
                alert('Title cannot be empty');
                return;
            }

            const taskItem = document.createElement('div');
            taskItem.className = 'task-item';
            taskItem.innerHTML = `
                <div class="task-title">${title}</div>
                <div class="task-description">${description}</div>
                <label>
                    <input type="checkbox" class="task-checkbox" ${completed ? 'checked' : ''}>
                    Completed
                </label>
                <button onclick="editTask(${taskId})">Edit</button>
                <button onclick="deleteTask(${taskId})">Delete</button>
            `;
            taskList.appendChild(taskItem);
            taskId++;
            clearForm();
        }

        function editTask(id) {
            const taskItem = document.querySelector(`#task-list .task-item:nth-child(${id})`);
            const title = taskItem.querySelector('.task-title').innerText;
            const description = taskItem.querySelector('.task-description').innerText;
            const completed = taskItem.querySelector('.task-checkbox').checked;

            document.getElementById('task-title').value = title;
            document.getElementById('task-description').value = description;
            document.getElementById('task-completed').checked = completed;

            const addTaskButton = document.querySelector('.form-container button');
            addTaskButton.onclick = () => {
                updateTask(id);
            };
            addTaskButton.innerText = 'Update Task';
        }

        function updateTask(id) {
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-description').value;
            const completed = document.getElementById('task-completed').checked;

            if (title.trim() === '') {
                alert('Title cannot be empty');
                return;
            }

            const taskItem = document.querySelector(`#task-list .task-item:nth-child(${id})`);
            taskItem.querySelector('.task-title').innerText = title;
            taskItem.querySelector('.task-description').innerText = description;
            taskItem.querySelector('.task-checkbox').checked = completed;

            clearForm();
            const addTaskButton = document.querySelector('.form-container button');
            addTaskButton.onclick = () => {
                addTask();
            };
            addTaskButton.innerText = 'Add Task';
        }

        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                const taskItem = document.querySelector(`#task-list .task-item:nth-child(${id})`);
                taskItem.remove();
            }
        }

        function clearForm() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-description').value = '';
            document.getElementById('task-completed').checked = false;
        }
        // [/graft:add_task]
    </script>
</body>
</html>
